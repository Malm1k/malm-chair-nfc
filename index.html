<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0e0e12;
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding: 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            margin-bottom: 35px;
            text-align: center;
        }

        h1 { 
            font-size: 24px; 
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        h2 { 
            color: #8e8e99; 
            font-size: 14px; 
            font-weight: 500;
        }

        /* Сетка ярлыков */
        #games-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px 15px; 
            justify-items: center;
        }

        /* Контейнер одного ярлыка */
        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Иконка */
        .icon-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
            background-color: #1c1c22;
            transition: all 0.2s ease;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover;
        }

        /* Затемнение и таймер поверх иконки */
        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 18px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .cooldown-spinner {
            font-size: 18px;
            margin-bottom: 2px;
            animation: spin 2s linear infinite;
        }

        .cooldown-time {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Текст под иконкой */
        .shortcut-name {
            font-size: 12px;
            font-weight: 500;
            color: #d1d1d6;
            text-align: center;
            line-height: 1.2;
            max-width: 80px;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Эффекты */
        .shortcut-item:hover:not(.disabled) .icon-wrapper { 
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .shortcut-item:hover:not(.disabled) .shortcut-name {
            color: #ffffff;
        }

        .shortcut-item:active:not(.disabled) .icon-wrapper { 
            transform: translateY(2px) scale(0.95); 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            filter: brightness(0.8);
        }

        /* Блокировка */
        .shortcut-item.disabled {
            cursor: not-allowed;
        }
        
        .shortcut-item.disabled .icon-wrapper {
            box-shadow: none;
        }

        .shortcut-item.active-cooldown .cooldown-overlay {
            display: flex;
        }
        
        .shortcut-item.disabled:not(.active-cooldown) .icon-wrapper {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        /* Подвал */
        .footer { 
            margin-top: 50px; 
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px; 
            font-weight: 500; 
            color: #6c6c77; 
            display: flex; align-items: center; justify-content: center;
        }
        
        #status-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #32d74b; 
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(50, 215, 75, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MALM PC</h1>
            <h2>Выберите что запустить</h2>
        </div>
        
        <div id="games-grid"></div>

        <div class="footer">
            <span id="status-dot"></span>
            <span id="status-text">Система готова</span>
        </div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        const gamesList = [
            { name: "Fortnite", trigger: "fortnite", img: "https://ui-avatars.com/api/?name=FN&background=1a1a1d&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "Counter-Strike 2", trigger: "cs", img: "https://ui-avatars.com/api/?name=CS&background=d97706&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "Rust", trigger: "rust", img: "https://ui-avatars.com/api/?name=RU&background=dc2626&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "Arma Reforger", trigger: "arma", img: "https://ui-avatars.com/api/?name=AR&background=4b5563&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "The Finals", trigger: "finals", img: "https://ui-avatars.com/api/?name=TF&background=ca8a04&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "Foxhole", trigger: "foxhole", img: "https://ui-avatars.com/api/?name=FH&background=374151&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "Euro Truck Sim 2", trigger: "ets2", img: "https://ui-avatars.com/api/?name=ET&background=2563eb&color=fff&size=200&font-size=0.4&bold=true" },
            { name: "ARC Raiders", trigger: "arc", img: "https://ui-avatars.com/api/?name=AC&background=0891b2&color=fff&size=200&font-size=0.4&bold=true" }
        ];

        const container = document.getElementById('games-grid');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const items = document.querySelectorAll('.shortcut-item');
            items.forEach(item => {
                const timeLabel = item.querySelector('.cooldown-time');
                if (cooldownSeconds > 0) {
                    item.classList.add('disabled');
                    if (item.classList.contains('active-cooldown')) {
                        timeLabel.innerText = cooldownSeconds;
                    }
                } else {
                    item.classList.remove('disabled');
                    item.classList.remove('active-cooldown');
                }
            });
        }

        gamesList.forEach(game => {
            const item = document.createElement('div');
            item.className = 'shortcut-item';
            
            item.innerHTML = `
                <div class="icon-wrapper">
                    <img class="icon-img" src="${game.img}" alt="${game.name}">
                    <div class="cooldown-overlay">
                        <div class="cooldown-spinner">⚙️</div>
                        <div class="cooldown-time">60</div>
                    </div>
                </div>
                <div class="shortcut-name">${game.name}</div>
            `;
            
            item.onclick = function() {
                if (!navigator.onLine) {
                    alert("Отсутствует подключение к сети.");
                    return;
                }

                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                this.classList.add('active-cooldown');
                cooldownSeconds = 60;
                updateButtonsState();

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds <= 0) {
                                clearInterval(timerInterval);
                            }
                            updateButtonsState();
                        }, 1000);
                    })
                    .catch(() => {
                        cooldownSeconds = 0;
                        updateButtonsState();
                        alert("Ошибка связи с сервером MALM PC.");
                    });
            };
            container.appendChild(item);
        });

        // Статус сети
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateNetworkStatus() {
            if (navigator.onLine) {
                statusDot.style.backgroundColor = '#32d74b';
                statusDot.style.boxShadow = '0 0 10px rgba(50, 215, 75, 0.4)';
                statusText.innerText = 'Соединение установлено';
            } else {
                statusDot.style.backgroundColor = '#ff453a';
                statusDot.style.boxShadow = '0 0 10px rgba(255, 69, 58, 0.4)';
                statusText.innerText = 'Сбой подключения (оффлайн)';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
