<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0e0e12;
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding: 30px 20px 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            display: flex;
            flex-direction: column;
        }

        /* Системная панель */
        .system-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
            background: #18181d;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sys-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: #202026;
        }

        .sys-btn svg {
            width: 20px;
            height: 20px;
            transition: fill 0.3s ease;
        }

        .sys-btn:hover { background: #2a2a32; }
        .sys-btn:active { transform: scale(0.92); }

        /* Цвета иконок по умолчанию */
        #svg-lock { fill: #32d74b; } /* Зеленый разблокировано */
        #svg-sleep { fill: #ffffff; }
        #svg-power { fill: #ffffff; }

        /* Цвета иконок при активации */
        .sys-btn.locked #svg-lock { fill: #ff453a; } /* Красный заблокировано */
        .sys-btn.sleep-active #svg-sleep { fill: #ffd60a; } /* Желтый сон */
        .sys-btn.power-off #svg-power { fill: #ff453a; } /* Красный выключение */

        /* Шапка */
        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 { 
            font-size: 24px; 
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        h2 { 
            color: #8e8e99; 
            font-size: 14px; 
            font-weight: 500;
        }

        /* Сетка ярлыков */
        #games-grid { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px 15px; 
            width: 100%;
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px; 
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .icon-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
            background-color: #1c1c22;
            transition: all 0.2s ease;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 18px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .cooldown-spinner {
            font-size: 18px;
            margin-bottom: 2px;
            animation: spin 2s linear infinite;
        }

        .cooldown-time {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .shortcut-name {
            font-size: 12px;
            font-weight: 500;
            color: #d1d1d6;
            text-align: center;
            line-height: 1.2;
            max-width: 90px;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .shortcut-item:hover:not(.disabled) .icon-wrapper { 
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .shortcut-item:hover:not(.disabled) .shortcut-name {
            color: #ffffff;
        }
        .shortcut-item:active:not(.disabled) .icon-wrapper { 
            transform: translateY(2px) scale(0.95); 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            filter: brightness(0.8);
        }

        .shortcut-item.disabled { cursor: not-allowed; }
        .shortcut-item.disabled .icon-wrapper { box-shadow: none; }
        .shortcut-item.active-cooldown .cooldown-overlay { display: flex; }
        .shortcut-item.disabled:not(.active-cooldown) .icon-wrapper {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        /* Подвал */
        .footer { 
            margin-top: 50px; 
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px; 
            font-weight: 500; 
            color: #6c6c77; 
            display: flex; align-items: center; justify-content: center;
        }
        
        #status-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #32d74b; 
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(50, 215, 75, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Системная панель с закрепленными кнопками -->
        <div class="system-controls">
            <!-- Кнопка Блокировки -->
            <button class="sys-btn" id="btn-lock" onclick="runSystemCommand('sys_lock')">
                <svg id="svg-lock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C9.243 2 7 4.243 7 7V10H6C4.897 10 4 10.897 4 12V20C4 21.103 4.897 22 6 22H18C19.103 22 20 21.103 20 20V12C20 10.897 19.103 10 18 10H17V7C17 4.243 14.757 2 12 2ZM9 7C9 5.346 10.346 4 12 4C13.654 4 15 5.346 15 7V10H9V7ZM12 18C10.895 18 10 17.105 10 16C10 14.895 10.895 14 12 14C13.105 14 14 14.895 14 16C14 17.105 13.105 18 12 18Z"/>
                </svg>
            </button>

            <!-- Кнопка Сна -->
            <button class="sys-btn" id="btn-sleep" onclick="runSystemCommand('sys_sleep')">
                <svg id="svg-sleep" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.368 13.568C19.539 13.843 18.663 14 17.75 14C12.918 14 9 10.082 9 5.25C9 4.337 9.157 3.461 9.432 2.632C5.748 3.654 3 7.126 3 11.25C3 16.082 6.918 20 11.75 20C15.874 20 19.346 17.252 20.368 13.568Z"/>
                </svg>
            </button>

            <!-- Кнопка Выключения -->
            <button class="sys-btn" id="btn-power" onclick="runSystemCommand('sys_power')">
                <svg id="svg-power" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21C7.029 21 3 16.971 3 12C3 8.358 5.17 5.228 8.243 3.666L9.141 5.45C6.837 6.623 5 8.956 5 12C5 15.86 8.14 19 12 19C15.86 19 19 15.86 19 12C19 8.956 17.163 6.623 14.859 5.45L15.757 3.666C18.83 5.228 21 8.358 21 12C21 16.971 16.971 21 12 21ZM11 2H13V12H11V2Z"/>
                </svg>
            </button>
        </div>

        <div class="header">
            <h1>MALM PC</h1>
            <h2>Выберите что запустить</h2>
        </div>
        
        <div id="games-grid"></div>

        <div class="footer">
            <span id="status-dot"></span>
            <span id="status-text">Система готова</span>
        </div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        // Обработка системных кнопок с паролем
        function runSystemCommand(triggerName) {
            const pass = prompt("Системная команда.\nВведите пароль для подтверждения:");
            if (pass !== "200208") {
                if (pass !== null) alert("Доступ запрещен. Неверный пароль.");
                return; // Если нажали отмену или ввели неверный пароль
            }

            const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${triggerName}&token=${TOKEN}`;

            // Запускаем через no-cors без проверки ответа (fire and forget)
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    // Оптимистично меняем цвета иконок
                    if (triggerName === 'sys_lock') {
                        document.getElementById('btn-lock').classList.add('locked');
                    } else if (triggerName === 'sys_sleep') {
                        document.getElementById('btn-sleep').classList.add('sleep-active');
                    } else if (triggerName === 'sys_power') {
                        document.getElementById('btn-power').classList.add('power-off');
                    }
                })
                .catch(() => {
                    alert("Ошибка отправки системной команды. Проверьте интернет.");
                });
        }

        const gamesList = [
            { name: "Fortnite", trigger: "fortnite", img: "fn.png" },
            { name: "Counter-Strike 2", trigger: "cs", img: "cs2.png" },
            { name: "Rust", trigger: "rust", img: "rust.png" },
            { name: "Arma Reforger", trigger: "armaref", img: "armaref.png" },
            { name: "The Finals", trigger: "finals", img: "finals.png" },
            { name: "Foxhole", trigger: "foxhole", img: "foxhole.png" },
            { name: "Euro Truck Simulator 2", trigger: "ets2", img: "ets2.png" },
            { name: "ARC Raiders", trigger: "arc", img: "arc.png" }
        ];

        const container = document.getElementById('games-grid');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const items = document.querySelectorAll('.shortcut-item');
            items.forEach(item => {
                const timeLabel = item.querySelector('.cooldown-time');
                if (cooldownSeconds > 0) {
                    item.classList.add('disabled');
                    if (item.classList.contains('active-cooldown')) {
                        timeLabel.innerText = cooldownSeconds;
                    }
                } else {
                    item.classList.remove('disabled');
                    item.classList.remove('active-cooldown');
                }
            });
        }

        gamesList.forEach(game => {
            const item = document.createElement('div');
            item.className = 'shortcut-item';
            
            item.innerHTML = `
                <div class="icon-wrapper">
                    <img class="icon-img" src="${game.img}" alt="${game.name}" onerror="this.src='https://ui-avatars.com/api/?name=${game.name.charAt(0)}&background=1c1c22&color=fff&size=200'">
                    <div class="cooldown-overlay">
                        <div class="cooldown-spinner">⚙️</div>
                        <div class="cooldown-time">60</div>
                    </div>
                </div>
                <div class="shortcut-name">${game.name}</div>
            `;
            
            item.onclick = function() {
                if (!navigator.onLine) {
                    alert("Отсутствует подключение к сети.");
                    return;
                }

                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                this.classList.add('active-cooldown');
                this.querySelector('.cooldown-spinner').style.display = 'block';
                this.querySelector('.cooldown-time').innerText = '...';

                // Вернули no-cors, чтобы избежать ложных ошибок от браузера
                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        this.querySelector('.cooldown-spinner').style.display = 'none';
                        cooldownSeconds = 60;
                        updateButtonsState();

                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds <= 0) {
                                clearInterval(timerInterval);
                            }
                            updateButtonsState();
                        }, 1000);
                    })
                    .catch(() => {
                        this.classList.remove('active-cooldown');
                        cooldownSeconds = 0;
                        updateButtonsState();
                        alert("Сбой сети при отправке команды.");
                    });
            };
            container.appendChild(item);
        });

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateNetworkStatus() {
            if (navigator.onLine) {
                statusDot.style.backgroundColor = '#32d74b';
                statusDot.style.boxShadow = '0 0 10px rgba(50, 215, 75, 0.4)';
                statusText.innerText = 'Система готова';
            } else {
                statusDot.style.backgroundColor = '#ff453a';
                statusDot.style.boxShadow = '0 0 10px rgba(255, 69, 58, 0.4)';
                statusText.innerText = 'Нет интернета';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
