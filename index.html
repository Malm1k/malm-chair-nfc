<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        /* Имитация фирменного шрифта Apple (San Francisco) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            /* Глубокий темный фон в стиле iOS абстракций */
            background-color: #000000;
            background-image: 
                radial-gradient(at 0% 0%, rgba(67, 30, 104, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(13, 56, 120, 0.5) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(10, 48, 85, 0.5) 0px, transparent 50%);
            color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 92%; max-width: 400px; 
            /* Эффект матового стекла (iOS Glassmorphism) */
            background: rgba(30, 30, 32, 0.65); 
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px; 
            padding: 40px 24px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 { 
            font-size: 28px; font-weight: 700;
            letter-spacing: 0.5px; 
            margin-bottom: 4px; 
            color: #ffffff;
        }

        p.subtitle { 
            color: #86868b; 
            font-size: 13px; 
            font-weight: 600;
            margin-bottom: 32px; 
            letter-spacing: 1.5px; 
        }

        #buttons-container { 
            display: flex; flex-direction: column; gap: 14px; 
        }

        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px; 
            background: rgba(255, 255, 255, 0.08); 
            color: #ffffff; 
            border: none; 
            border-radius: 20px; 
            font-family: inherit; 
            font-size: 17px; font-weight: 600; 
            letter-spacing: -0.2px;
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .btn span.icon { 
            margin-right: 12px; font-size: 22px; 
        }

        /* Анимация нажатия в стиле iOS */
        .btn:active { 
            transform: scale(0.96); 
            background: rgba(255, 255, 255, 0.12); 
        }

        .footer { 
            margin-top: 35px; 
            font-size: 13px; 
            font-weight: 500;
            color: #6e6e73; 
        }
        
        .footer span {
            display: inline-block;
            width: 8px; height: 8px;
            background-color: #34c759;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(52, 199, 89, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MALM PC</h1>
        <p class="subtitle">MALM CHAIR NFC</p>
        
        <div id="buttons-container"></div>

        <div class="footer"><span></span>Система активна</div>
    </div>

    <script>
        // 1. Твои данные для подключения
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        // 2. СПИСОК ИГР (Базу данных убрали, добавили Foxhole)
        const gamesList = [
            { name: "Fortnite", icon: "🎮", trigger: "fortnite" },
            { name: "Counter-Strike", icon: "🔫", trigger: "cs" },
            { name: "Foxhole", icon: "🪖", trigger: "foxhole" }
        ];

        // 3. Логика генерации кнопок
        const container = document.getElementById('buttons-container');

        gamesList.forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `<span class="icon">${game.icon}</span> ${game.name}`;
            
            btn.onclick = function() {
                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                const originalText = this.innerHTML;
                // Анимация в стиле iOS (синий цвет акцента)
                this.innerHTML = `<span class="icon">⚙️</span> Запуск...`;
                this.style.color = '#0a84ff';

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        setTimeout(() => {
                            this.innerHTML = `<span class="icon">✅</span> Готово`;
                            this.style.color = '#34c759'; // Системный зеленый iOS
                            
                            setTimeout(() => {
                                this.innerHTML = originalText;
                                this.style.color = '#ffffff';
                            }, 1500);
                        }, 400);
                    })
                    .catch(() => {
                        alert('Сбой подключения к ПК');
                        this.innerHTML = originalText;
                        this.style.color = '#ffffff';
                    });
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
