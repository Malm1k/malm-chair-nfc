<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0e0e12;
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px 50px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Страницы (переключение) */
        .page {
            display: none;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Идеально отцентрированная шапка через Grid */
        .header-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Левый блок (Системные кнопки) */
        .sys-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
        }

        .sys-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sys-btn svg {
            width: 22px;
            height: 22px;
            transition: fill 0.3s ease, transform 0.2s ease;
        }

        .sys-btn:active svg { transform: scale(0.85); }

        /* Цвета системных иконок */
        #svg-lock { fill: #32d74b; } 
        #svg-sleep { fill: #ffffff; opacity: 0.7; }
        #svg-power { fill: #ffffff; opacity: 0.7; }

        .sys-btn.locked #svg-lock { fill: #ff453a; } 
        .sys-btn.sleep-active #svg-sleep { fill: #ffd60a; opacity: 1; } 
        .sys-btn.power-off #svg-power { fill: #ff453a; opacity: 1; } 

        /* Центральный блок (Текст) */
        .header-text {
            text-align: center;
        }

        h1 { 
            font-size: 22px; 
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        h2 { 
            color: #8e8e99; 
            font-size: 13px; 
            font-weight: 500;
        }

        /* Правый блок (Навигация) */
        .nav-buttons {
            display: flex;
            justify-content: flex-end;
        }

        .nav-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn svg {
            width: 26px;
            height: 26px;
            fill: #0a84ff; /* Синий цвет как у активных элементов */
            transition: transform 0.2s ease, fill 0.2s ease;
        }

        .nav-btn:active svg {
            transform: scale(0.85);
            fill: #0066cc;
        }

        /* Сетка ярлыков (Главная страница) */
        #games-grid { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px 15px; 
            width: 100%;
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px; 
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .icon-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
            background-color: #1c1c22;
            transition: all 0.2s ease;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover;
        }

        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 18px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .cooldown-spinner { font-size: 18px; margin-bottom: 2px; animation: spin 2s linear infinite; }
        .cooldown-time { font-size: 16px; font-weight: 700; color: #fff; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .shortcut-name {
            font-size: 12px;
            font-weight: 500;
            color: #d1d1d6;
            text-align: center;
            line-height: 1.2;
            max-width: 90px;
            word-wrap: break-word;
        }

        .shortcut-item:active:not(.disabled) .icon-wrapper { 
            transform: translateY(2px) scale(0.95); 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            filter: brightness(0.8);
        }

        .shortcut-item.disabled { cursor: not-allowed; }
        .shortcut-item.disabled .icon-wrapper { box-shadow: none; }
        .shortcut-item.active-cooldown .cooldown-overlay { display: flex; }
        .shortcut-item.disabled:not(.active-cooldown) .icon-wrapper {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        /* --- Стили для страницы Мониторинга --- */
        .hw-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .hw-card {
            background: #1c1c22;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hw-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .hw-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hw-model {
            font-size: 12px;
            color: #8e8e99;
        }

        .hw-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label { font-size: 11px; color: #8e8e99; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
        
        .temp-hot { color: #ff453a; }
        .temp-normal { color: #32d74b; }
        
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Шапка (Одинаковая для обеих страниц) -->
        <div class="header-row">
            <!-- Лево: Системные кнопки -->
            <div class="sys-buttons">
                <button class="sys-btn" id="btn-lock" onclick="runSystemCommand('sys_lock')">
                    <svg id="svg-lock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C9.243 2 7 4.243 7 7V10H6C4.897 10 4 10.897 4 12V20C4 21.103 4.897 22 6 22H18C19.103 22 20 21.103 20 20V12C20 10.897 19.103 10 18 10H17V7C17 4.243 14.757 2 12 2ZM9 7C9 5.346 10.346 4 12 4C13.654 4 15 5.346 15 7V10H9V7ZM12 18C10.895 18 10 17.105 10 16C10 14.895 10.895 14 12 14C13.105 14 14 14.895 14 16C14 17.105 13.105 18 12 18Z"/>
                    </svg>
                </button>
                <button class="sys-btn" id="btn-sleep" onclick="runSystemCommand('sys_sleep')">
                    <svg id="svg-sleep" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.368 13.568C19.539 13.843 18.663 14 17.75 14C12.918 14 9 10.082 9 5.25C9 4.337 9.157 3.461 9.432 2.632C5.748 3.654 3 7.126 3 11.25C3 16.082 6.918 20 11.75 20C15.874 20 19.346 17.252 20.368 13.568Z"/>
                    </svg>
                </button>
                <button class="sys-btn" id="btn-power" onclick="runSystemCommand('sys_power')">
                    <svg id="svg-power" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21C7.029 21 3 16.971 3 12C3 8.358 5.17 5.228 8.243 3.666L9.141 5.45C6.837 6.623 5 8.956 5 12C5 15.86 8.14 19 12 19C15.86 19 19 15.86 19 12C19 8.956 17.163 6.623 14.859 5.45L15.757 3.666C18.83 5.228 21 8.358 21 12C21 16.971 16.971 21 12 21ZM11 2H13V12H11V2Z"/>
                    </svg>
                </button>
            </div>
            
            <!-- Центр: Название -->
            <div class="header-text">
                <h1>MALM PC</h1>
                <h2 id="subtitle">Выберите что запустить</h2>
            </div>

            <!-- Право: Кнопка навигации (переключается скриптом) -->
            <div class="nav-buttons">
                <!-- Кнопка Видеокарты -->
                <button class="nav-btn" id="btn-nav-hw" onclick="switchPage('hw')">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 5V19H22V5H2ZM20 17H4V7H20V17ZM6 9H18V15H6V9ZM8 11V13H10V11H8ZM11 11V13H13V11H11ZM14 11V13H16V11H14Z"/>
                        <path d="M5 21H19V23H5V21Z"/>
                    </svg>
                </button>
                <!-- Кнопка Домика (изначально скрыта) -->
                <button class="nav-btn" id="btn-nav-home" style="display: none;" onclick="switchPage('games')">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3L2 12H5V20H19V12H22L12 3ZM10 18V14H14V18H10Z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- СТРАНИЦА 1: ИГРЫ -->
        <div id="page-games" class="page active">
            <div id="games-grid"></div>
        </div>

        <!-- СТРАНИЦА 2: МОНИТОРИНГ (ПОКА ЗАГЛУШКИ) -->
        <div id="page-hw" class="page">
            <div class="hw-grid">
                <!-- CPU Card -->
                <div class="hw-card">
                    <div class="hw-header">
                        <div class="hw-title">⚙️ CPU</div>
                        <div class="hw-model">Intel / AMD Processor</div>
                    </div>
                    <div class="hw-stats">
                        <div class="stat-item">
                            <span class="stat-label">Загрузка</span>
                            <span class="stat-value">34%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Температура</span>
                            <span class="stat-value temp-normal">45°C</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Частота</span>
                            <span class="stat-value">4.2 GHz</span>
                        </div>
                    </div>
                </div>

                <!-- GPU Card -->
                <div class="hw-card">
                    <div class="hw-header">
                        <div class="hw-title">🎮 GPU</div>
                        <div class="hw-model">NVIDIA / AMD Graphics</div>
                    </div>
                    <div class="hw-stats">
                        <div class="stat-item">
                            <span class="stat-label">Загрузка</span>
                            <span class="stat-value">89%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Температура</span>
                            <span class="stat-value temp-hot">72°C</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">VRAM</span>
                            <span class="stat-value">6.5 GB</span>
                        </div>
                    </div>
                </div>

                <!-- RAM Card -->
                <div class="hw-card">
                    <div class="hw-header">
                        <div class="hw-title">💾 ОЗУ</div>
                        <div class="hw-model">DDR4 / DDR5</div>
                    </div>
                    <div class="hw-stats">
                        <div class="stat-item">
                            <span class="stat-label">Используется</span>
                            <span class="stat-value">12.4 GB</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Свободно</span>
                            <span class="stat-value">19.6 GB</span>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        // Логика переключения страниц
        function switchPage(page) {
            const pageGames = document.getElementById('page-games');
            const pageHw = document.getElementById('page-hw');
            const btnHw = document.getElementById('btn-nav-hw');
            const btnHome = document.getElementById('btn-nav-home');
            const subtitle = document.getElementById('subtitle');

            if (page === 'hw') {
                pageGames.classList.remove('active');
                pageHw.classList.add('active');
                btnHw.style.display = 'none';
                btnHome.style.display = 'flex';
                subtitle.innerText = 'Состояние системы';
            } else {
                pageHw.classList.remove('active');
                pageGames.classList.add('active');
                btnHome.style.display = 'none';
                btnHw.style.display = 'flex';
                subtitle.innerText = 'Выберите что запустить';
            }
        }

        // Системные команды
        function runSystemCommand(triggerName) {
            const pass = prompt("Системная команда.\nВведите пароль для подтверждения:");
            if (pass !== "200208") {
                if (pass !== null) alert("Доступ запрещен. Неверный пароль.");
                return;
            }

            const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${triggerName}&token=${TOKEN}`;

            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    if (triggerName === 'sys_lock') {
                        document.getElementById('btn-lock').classList.add('locked');
                    } else if (triggerName === 'sys_sleep') {
                        document.getElementById('btn-sleep').classList.add('sleep-active');
                    } else if (triggerName === 'sys_power') {
                        document.getElementById('btn-power').classList.add('power-off');
                    }
                })
                .catch(() => {
                    alert("Ошибка отправки. Проверьте интернет.");
                });
        }

        // Рендер игр
        const gamesList = [
            { name: "Fortnite", trigger: "fortnite", img: "fn.png" },
            { name: "Counter-Strike 2", trigger: "cs", img: "cs2.png" },
            { name: "Rust", trigger: "rust", img: "rust.png" },
            { name: "Arma Reforger", trigger: "armaref", img: "armaref.png" },
            { name: "The Finals", trigger: "finals", img: "finals.png" },
            { name: "Foxhole", trigger: "foxhole", img: "foxhole.png" },
            { name: "Euro Truck Simulator 2", trigger: "ets2", img: "ets2.png" },
            { name: "ARC Raiders", trigger: "arc", img: "arc.png" }
        ];

        const container = document.getElementById('games-grid');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const items = document.querySelectorAll('.shortcut-item');
            items.forEach(item => {
                const timeLabel = item.querySelector('.cooldown-time');
                if (cooldownSeconds > 0) {
                    item.classList.add('disabled');
                    if (item.classList.contains('active-cooldown')) {
                        timeLabel.innerText = cooldownSeconds;
                    }
                } else {
                    item.classList.remove('disabled');
                    item.classList.remove('active-cooldown');
                }
            });
        }

        gamesList.forEach(game => {
            const item = document.createElement('div');
            item.className = 'shortcut-item';
            
            item.innerHTML = `
                <div class="icon-wrapper">
                    <img class="icon-img" src="${game.img}" alt="${game.name}" onerror="this.src='https://ui-avatars.com/api/?name=${game.name.charAt(0)}&background=1c1c22&color=fff&size=200'">
                    <div class="cooldown-overlay">
                        <div class="cooldown-spinner">⚙️</div>
                        <div class="cooldown-time">60</div>
                    </div>
                </div>
                <div class="shortcut-name">${game.name}</div>
            `;
            
            item.onclick = function() {
                if (!navigator.onLine) {
                    alert("Отсутствует подключение к сети.");
                    return;
                }

                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                this.classList.add('active-cooldown');
                this.querySelector('.cooldown-spinner').style.display = 'block';
                this.querySelector('.cooldown-time').innerText = '...';

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        this.querySelector('.cooldown-spinner').style.display = 'none';
                        cooldownSeconds = 60;
                        updateButtonsState();

                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds <= 0) {
                                clearInterval(timerInterval);
                            }
                            updateButtonsState();
                        }, 1000);
                    })
                    .catch(() => {
                        this.classList.remove('active-cooldown');
                        cooldownSeconds = 0;
                        updateButtonsState();
                        alert("Сбой сети при отправке команды.");
                    });
            };
            container.appendChild(item);
        });
    </script>
</body>
</html>
