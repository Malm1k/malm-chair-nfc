<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC | Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a;
            color: #d1d1d1; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; 
            max-width: 440px; 
            padding: 40px 30px; 
            background: #0a0a0a;
        }

        /* Строгая шапка */
        .header {
            margin-bottom: 50px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        h1 { 
            font-size: 14px; 
            font-weight: 500;
            letter-spacing: 4px; 
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        p.subtitle { 
            color: #555; 
            font-size: 10px; 
            font-weight: 400;
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* Список команд */
        #buttons-container { 
            display: flex; flex-direction: column; 
        }

        .btn { 
            display: flex; align-items: center;
            width: 100%; 
            padding: 24px 0; 
            background: transparent;
            color: #d1d1d1; 
            border: none;
            border-bottom: 1px solid #1a1a1a; 
            font-family: inherit; 
            font-size: 14px; 
            font-weight: 400; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer; 
            transition: all 0.4s ease;
            text-align: left;
        }

        /* Нумерация вместо детских эмодзи */
        .btn span.index { 
            font-size: 10px;
            color: #555;
            margin-right: 20px;
            letter-spacing: 1px;
            transition: color 0.4s ease;
        }

        .btn span.text {
            flex-grow: 1;
        }

        .btn span.status-label {
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
        }

        /* Благородные эффекты наведения */
        .btn:hover:not(.disabled) { 
            color: #ffffff;
            padding-left: 10px;
            border-bottom: 1px solid #444;
        }

        .btn:hover:not(.disabled) span.index {
            color: #ffffff;
        }

        .btn:active:not(.disabled) { 
            color: #888;
            transition: all 0.1s ease;
        }

        /* Состояние таймера */
        .btn.disabled {
            color: #333;
            cursor: not-allowed;
        }
        
        .btn.disabled span.index,
        .btn.disabled span.status-label {
            color: #333;
        }

        /* Подвал со статусом */
        .footer { 
            margin-top: 60px; 
            font-size: 10px; 
            font-weight: 400; 
            color: #555; 
            display: flex; align-items: center; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        #status-dot {
            display: inline-block; width: 4px; height: 4px;
            background-color: #555; 
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.4s;
        }
        
        #status-dot.online {
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MALM PC</h1>
            <p class="subtitle">System Control Interface</p>
        </div>
        
        <div id="buttons-container"></div>

        <div class="footer">
            <span id="status-dot"></span>
            <span id="status-text">Ожидание сети</span>
        </div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        const gamesList = [
            { name: "Fortnite", trigger: "fortnite" },
            { name: "Counter-Strike", trigger: "cs" },
            { name: "Foxhole", trigger: "foxhole" }
        ];

        const container = document.getElementById('buttons-container');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const statusLabel = btn.querySelector('.status-label');
                if (cooldownSeconds > 0) {
                    btn.classList.add('disabled');
                    if (btn.dataset.isProcessing === "true") {
                        statusLabel.innerText = `БЛОКИРОВКА [${cooldownSeconds}]`;
                    } else {
                        statusLabel.innerText = "ОЖИДАНИЕ";
                    }
                } else {
                    btn.classList.remove('disabled');
                    btn.dataset.isProcessing = "false";
                    statusLabel.innerText = "ЗАПУСТИТЬ";
                }
            });
        }

        gamesList.forEach((game, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.dataset.isProcessing = "false";
            
            // Форматируем номер (01, 02, 03)
            const num = (index + 1).toString().padStart(2, '0');
            
            btn.innerHTML = `
                <span class="index">${num} /</span>
                <span class="text">${game.name}</span>
                <span class="status-label">ЗАПУСТИТЬ</span>
            `;
            
            btn.onclick = function() {
                if (!navigator.onLine) {
                    alert("Системная ошибка: Отсутствует подключение к сети.");
                    return;
                }

                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                const statusLabel = this.querySelector('.status-label');
                
                this.dataset.isProcessing = "true";
                statusLabel.innerText = "ОТПРАВКА...";

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        cooldownSeconds = 60;
                        updateButtonsState();
                        
                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds <= 0) {
                                clearInterval(timerInterval);
                            }
                            updateButtonsState();
                        }, 1000);
                    })
                    .catch(() => {
                        this.dataset.isProcessing = "false";
                        statusLabel.innerText = "ОШИБКА";
                        setTimeout(() => {
                            statusLabel.innerText = "ЗАПУСТИТЬ";
                        }, 2000);
                    });
            };
            container.appendChild(btn);
        });

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateNetworkStatus() {
            if (navigator.onLine) {
                statusDot.classList.add('online');
                statusText.innerText = 'Терминал активен';
            } else {
                statusDot.classList.remove('online');
                statusText.innerText = 'Сбой подключения';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
