<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #070709; 
            background-image: radial-gradient(circle at 50% -20%, #2a0a4a 0%, #070709 80%);
            color: #ffffff; 
            font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
        }

        .container { 
            width: 90%; max-width: 400px; 
            background: rgba(20, 20, 25, 0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; 
            padding: 40px 25px; 
            text-align: center; 
            position: relative;
            z-index: 1;
        }

        /* Неоновая тень позади панели */
        .container::before {
            content: ''; 
            position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, #ff007f, #00f2fe);
            z-index: -1; 
            border-radius: 25px; 
            filter: blur(15px); 
            opacity: 0.15;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 34px; font-weight: 700;
            background: linear-gradient(to right, #00f2fe, #4facfe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 3px; 
            margin-bottom: 5px; 
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        p.subtitle { 
            color: #64748b; 
            font-family: 'Orbitron', sans-serif;
            font-size: 12px; 
            margin-bottom: 35px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        #buttons-container { 
            display: flex; flex-direction: column; gap: 16px; 
        }

        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px; 
            background: rgba(255, 255, 255, 0.03); 
            color: #cbd5e1; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px; 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 20px; font-weight: 700; 
            letter-spacing: 1px;
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase;
        }

        .btn span.icon { 
            margin-right: 12px; font-size: 22px; 
        }

        .btn:hover, .btn:active { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: #00f2fe; 
            color: #ffffff;
            transform: scale(1.03); 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 10px rgba(0, 242, 254, 0.1); 
        }

        .footer { 
            margin-top: 30px; 
            font-size: 11px; 
            color: #334155; 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MALM PC</h1>
        <p class="subtitle">NFC Command Link</p>
        
        <div id="buttons-container"></div>

        <div class="footer">ENCRYPTED CONNECTION</div>
    </div>

    <script>
        // 1. Твои данные для подключения
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        // 2. СПИСОК ИГР И ПРОГРАММ
        const gamesList = [
            { name: "Fortnite", icon: "🎮", trigger: "fortnite" },
            { name: "Counter-Strike", icon: "🔫", trigger: "cs" },
            { name: "Database", icon: "🗄", trigger: "db" }
        ];

        // 3. Логика генерации кнопок
        const container = document.getElementById('buttons-container');

        gamesList.forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `<span class="icon">${game.icon}</span> ${game.name}`;
            
            btn.onclick = function() {
                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                const originalText = this.innerHTML;
                this.innerHTML = `<span class="icon">⚡</span> Инициализация...`;
                this.style.borderColor = '#ff007f';
                this.style.boxShadow = '0 0 20px rgba(255, 0, 127, 0.3)';

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        setTimeout(() => {
                            this.innerHTML = `<span class="icon">✅</span> Выполнено`;
                            this.style.borderColor = '#00f2fe';
                            this.style.boxShadow = '0 0 20px rgba(0, 242, 254, 0.3)';
                            
                            setTimeout(() => {
                                this.innerHTML = originalText;
                                this.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                                this.style.boxShadow = 'none';
                            }, 2000);
                        }, 500);
                    })
                    .catch(() => {
                        alert('Ошибка соединения с ПК');
                        this.innerHTML = originalText;
                    });
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
