<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #030303;
            /* Едва заметный градиент для глубины черного */
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #030303 70%);
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Премиальная стеклянная панель без цвета */
        .container { 
            width: 90%; 
            max-width: 420px; 
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            
            border-radius: 32px; 
            padding: 45px 30px; 
            text-align: center; 
            position: relative;
            
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        h1 { 
            font-size: 32px; font-weight: 800;
            letter-spacing: 2px; 
            margin-bottom: 6px; 
            color: #ffffff;
            text-transform: uppercase;
        }

        p.subtitle { 
            color: #777777; 
            font-size: 11px; 
            font-weight: 600;
            margin-bottom: 35px; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }

        .section-title {
            font-size: 14px;
            font-weight: 400;
            color: #aaaaaa;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        #buttons-container { 
            display: flex; flex-direction: column; gap: 16px; 
        }

        /* Полностью прозрачные ч/б кнопки */
        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px; 
            
            background: transparent;
            color: #ffffff; 
            
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px; 
            
            font-family: inherit; 
            font-size: 16px; font-weight: 400; 
            letter-spacing: 1px;
            cursor: pointer; 
            
            transition: all 0.3s ease; 
        }

        /* Обесцвечиваем системные эмодзи для строгости */
        .btn span.icon { 
            margin-right: 14px; font-size: 20px; 
            filter: grayscale(100%) brightness(200%);
            transition: filter 0.3s ease;
        }

        .btn:hover:not(.disabled) { 
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn:active:not(.disabled) { 
            transform: scale(0.97); 
            background: #ffffff;
            color: #000000;
        }
        .btn:active:not(.disabled) span.icon {
            filter: grayscale(100%) brightness(0%);
        }

        /* Состояние блокировки во время кулдауна */
        .btn.disabled {
            border-color: rgba(255, 255, 255, 0.05);
            color: #555555;
            cursor: not-allowed;
            background: transparent;
        }
        .btn.disabled span.icon {
            filter: grayscale(100%) opacity(30%);
        }

        .footer { 
            margin-top: 40px; 
            font-size: 11px; font-weight: 600; color: #666666; 
            display: flex; align-items: center; justify-content: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        #status-dot {
            display: inline-block; width: 6px; height: 6px;
            background-color: #ffffff; 
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transition: all 0.3s;
        }

        /* Анимация пульсации для статуса */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,1); }
            100% { opacity: 0.5; }
        }
        .active-pulse { animation: pulse 2s infinite; }

    </style>
</head>
<body>
    <div class="container">
        <h1>MALM PC</h1>
        <p class="subtitle">MALM CHAIR NFC</p>
        
        <h2 class="section-title">Выберите что запустить</h2>
        <div id="buttons-container"></div>

        <div class="footer">
            <span id="status-dot" class="active-pulse"></span>
            <span id="status-text">СИСТЕМА ГОТОВА</span>
        </div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        const gamesList = [
            { name: "Fortnite", icon: "🎮", trigger: "fortnite" },
            { name: "Counter-Strike", icon: "🔫", trigger: "cs" },
            { name: "Foxhole", icon: "🪖", trigger: "foxhole" }
        ];

        const container = document.getElementById('buttons-container');
        let cooldownSeconds = 0; // Глобальный таймер

        // Функция обновления кнопок во время кулдауна
        function updateButtonsState() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                if (cooldownSeconds > 0) {
                    btn.classList.add('disabled');
                } else {
                    btn.classList.remove('disabled');
                    // Возвращаем оригинальный текст, если таймер кончился
                    if (btn.dataset.originalHtml) {
                        btn.innerHTML = btn.dataset.originalHtml;
                    }
                }
            });
        }

        gamesList.forEach(game => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.dataset.originalHtml = `<span class="icon">${game.icon}</span> ${game.name}`;
            btn.innerHTML = btn.dataset.originalHtml;
            
            btn.onclick = function() {
                // Если нет интернета - блокируем нажатие
                if (!navigator.onLine) {
                    alert("Ошибка: Нет подключения к интернету.");
                    return;
                }

                // Если идет таймер ограничения TriggerCMD - блокируем нажатие
                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                this.innerHTML = `<span class="icon">⏳</span> СОЕДИНЕНИЕ...`;

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        // Успешно отправлено, запускаем минутный таймер
                        cooldownSeconds = 60;
                        updateButtonsState();
                        
                        this.innerHTML = `<span class="icon">✓</span> ЗАПУЩЕНО`;
                        
                        // Каждую секунду обновляем счетчик
                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds > 0) {
                                this.innerHTML = `<span class="icon">⏳</span> ЛИМИТ (${cooldownSeconds}с)`;
                            } else {
                                clearInterval(timerInterval);
                                updateButtonsState();
                            }
                        }, 1000);
                    })
                    .catch(() => {
                        this.innerHTML = `<span class="icon">✕</span> ОШИБКА СЕТИ`;
                        setTimeout(() => {
                            this.innerHTML = this.dataset.originalHtml;
                        }, 2000);
                    });
            };
            container.appendChild(btn);
        });

        // ЛОГИКА ИНДИКАТОРА СЕТИ (Ч/Б СТИЛЬ)
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateNetworkStatus() {
            if (navigator.onLine) {
                statusDot.style.backgroundColor = '#ffffff';
                statusDot.style.boxShadow = '0 0 10px rgba(255,255,255,0.8)';
                statusDot.classList.add('active-pulse');
                statusText.innerText = 'СИСТЕМА ГОТОВА';
            } else {
                statusDot.style.backgroundColor = '#444444';
                statusDot.style.boxShadow = 'none';
                statusDot.classList.remove('active-pulse');
                statusText.innerText = 'СЕТЬ НЕДОСТУПНА';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
