<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0e0e12; color: #ffffff; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            min-height: 100vh; padding: 40px 20px 40px 20px;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        .container { 
            width: 100%; max-width: 400px; display: flex; flex-direction: column;
            min-height: calc(100vh - 80px); position: relative;
        }

        /* Шапка */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; margin-bottom: 40px;
        }

        .sys-buttons { 
            display: flex; gap: 15px; 
            width: 75px; /* Фиксированная ширина для идеального центрирования заголовка */
        }
        
        .sys-buttons.right { justify-content: flex-end; }
        
        .sys-btn { 
            background: transparent; border: none; cursor: pointer; outline: none; 
            padding: 5px; display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s ease; 
        }
        
        .sys-btn svg { width: 24px; height: 24px; transition: all 0.3s ease; }
        .sys-btn:active svg { transform: scale(0.85); }

        /* Цвета иконок */
        #svg-power, #svg-sleep { fill: #ffffff; opacity: 0.7; }
        #svg-restart { stroke: #ffffff; opacity: 0.7; }
        
        /* Состояния кнопок питания и сна */
        .sys-btn.power-off #svg-power { fill: #ff453a; opacity: 1; }
        .sys-btn.sleep-active #svg-sleep { fill: #ffd60a; opacity: 1; }
        
        /* Логика замка */
        #svg-lock-closed { display: none; }
        #svg-lock-open { display: block; fill: #32d74b; }
        .sys-btn.locked #svg-lock-open { display: none; }
        .sys-btn.locked #svg-lock-closed { display: block; fill: #ff453a; }
        
        /* Анимация перезагрузки (против часовой) */
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        .sys-btn.restarting #svg-restart { 
            stroke: #00a8ff; 
            opacity: 1; 
            animation: spin-reverse 1.5s linear infinite; 
        }

        /* Увеличенный заголовок */
        h1 { 
            font-size: 28px; font-weight: 700; color: #ffffff; 
            letter-spacing: 2px; text-align: center; flex-grow: 1;
        }

        /* Сетка игр */
        h2 { color: #d1d1d6; font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 35px; }

        /* Фиксируем ширину сетки для идеального центрирования нижнего ряда */
        #games-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 25px 15px; width: 100%; max-width: 330px; margin: 0 auto; 
        }
        
        .shortcut-item { 
            display: flex; flex-direction: column; align-items: center; 
            width: 100px; cursor: pointer; background: transparent; border: none; 
            outline: none; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        
        .icon-wrapper { 
            position: relative; width: 72px; height: 72px; border-radius: 18px; 
            margin-bottom: 10px; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3); 
            background-color: #1c1c22; transition: all 0.3s ease; 
        }
        .icon-img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
        
        .shortcut-name { font-size: 12px; font-weight: 500; color: #d1d1d6; text-align: center; line-height: 1.2; max-width: 90px; word-wrap: break-word; }
        
        /* Оверлей загрузки и таймера */
        .cooldown-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); border-radius: 18px; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            backdrop-filter: blur(2px); transition: all 0.3s ease;
        }
        .status-icon { font-size: 22px; margin-bottom: 2px; }
        .cooldown-time { font-size: 18px; font-weight: 700; color: #fff; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .shortcut-item:active:not(.disabled) .icon-wrapper { transform: translateY(2px) scale(0.95); }
        .shortcut-item.disabled { cursor: not-allowed; } 
        .shortcut-item.disabled:not(.active-action) .icon-wrapper { opacity: 0.4; filter: grayscale(100%); }
        .shortcut-item.active-action .cooldown-overlay { display: flex; }
        
        .icon-wrapper.success-glow {
            box-shadow: 0 0 20px rgba(50, 215, 75, 0.6);
            border: 2px solid #32d74b;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Шапка -->
        <div class="top-bar">
            <div class="sys-buttons">
                <button class="sys-btn" id="btn-power" onclick="runSystemCommand('sys_power')">
                    <svg id="svg-power" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21C7.029 21 3 16.971 3 12C3 8.358 5.17 5.228 8.243 3.666L9.141 5.45C6.837 6.623 5 8.956 5 12C5 15.86 8.14 19 12 19C15.86 19 19 15.86 19 12C19 8.956 17.163 6.623 14.859 5.45L15.757 3.666C18.83 5.228 21 8.358 21 12C21 16.971 16.971 21 12 21ZM11 2H13V12H11V2Z"/></svg>
                </button>
                <button class="sys-btn" id="btn-restart" onclick="runSystemCommand('sys_restart')">
                    <svg id="svg-restart" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>
            
            <h1>MALM PC</h1>

            <div class="sys-buttons right">
                <button class="sys-btn" id="btn-sleep" onclick="runSystemCommand('sys_sleep')">
                    <svg id="svg-sleep" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.368 13.568C19.539 13.843 18.663 14 17.75 14C12.918 14 9 10.082 9 5.25C9 4.337 9.157 3.461 9.432 2.632C5.748 3.654 3 7.126 3 11.25C3 16.082 6.918 20 11.75 20C15.874 20 19.346 17.252 20.368 13.568Z"/></svg>
                </button>
                <button class="sys-btn" id="btn-lock" onclick="runSystemCommand('sys_lock')">
                    <!-- Открытый замок (Зеленый) -->
                    <svg id="svg-lock-open" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 11V7c0-2.206 1.794-4 4-4s4 1.794 4 4v1h2V7c0-3.309-2.691-6-6-6S6 3.691 6 7v4H5c-1.103 0-2 .897-2 2v10c0 1.103.897 2 2 2h14c1.103 0 2-.897 2-2V13c0-1.103-.897-2-2-2H8zm4 7c-1.104 0-2-.896-2-2s.896-2 2-2 2 .896 2 2-.896 2-2 2z"/>
                    </svg>
                    <!-- Закрытый замок (Красный) -->
                    <svg id="svg-lock-closed" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 11h-1V7c0-3.309-2.691-6-6-6S6 3.691 6 7v4H5c-1.103 0-2 .897-2 2v10c0 1.103.897 2 2 2h14c1.103 0 2-.897 2-2V13c0-1.103-.897-2-2-2zm-7 7c-1.104 0-2-.896-2-2s.896-2 2-2 2 .896 2 2-.896 2-2 2zm3-7H9V7c0-1.654 1.346-3 3-3s3 1.346 3 3v4z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Сетка игр -->
        <h2>Выберите что запустить</h2>
        <div id="games-grid"></div>

    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        // Системные команды (Пароль на все 4 действия)
        function runSystemCommand(triggerName) {
            const pass = prompt("Системная команда.\nВведите пароль для подтверждения:");
            if (pass !== "200208") {
                if (pass !== null) alert("Доступ запрещен. Неверный пароль.");
                return;
            }

            const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${triggerName}&token=${TOKEN}`;

            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    if (triggerName === 'sys_lock') document.getElementById('btn-lock').classList.add('locked');
                    else if (triggerName === 'sys_sleep') document.getElementById('btn-sleep').classList.add('sleep-active');
                    else if (triggerName === 'sys_power') document.getElementById('btn-power').classList.add('power-off');
                    else if (triggerName === 'sys_restart') document.getElementById('btn-restart').classList.add('restarting');
                })
                .catch(() => alert("Ошибка отправки. Проверьте интернет."));
        }

        // Игры строго по скриншоту
        const gamesList = [
            { name: "Fortnite", trigger: "fortnite", img: "fn.png" },
            { name: "Counter-Strike 2", trigger: "cs", img: "cs2.png" },
            { name: "Rust", trigger: "rust", img: "rust.png" },
            { name: "Arma Reforger", trigger: "armaref", img: "armaref.png" },
            { name: "The Finals", trigger: "finals", img: "finals.png" },
            { name: "Foxhole", trigger: "foxhole", img: "foxhole.png" },
            { name: "Euro Truck Simulator 2", trigger: "ets2", img: "ets2.png" },
            { name: "ARC Raiders", trigger: "arc", img: "arc.png" }
        ];

        const container = document.getElementById('games-grid');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const items = document.querySelectorAll('.shortcut-item');
            items.forEach(item => {
                const timeLabel = item.querySelector('.cooldown-time');
                if (cooldownSeconds > 0) {
                    item.classList.add('disabled');
                    if (item.classList.contains('active-action') && timeLabel.innerText !== '') {
                        timeLabel.innerText = cooldownSeconds;
                    }
                } else {
                    item.classList.remove('disabled');
                    item.classList.remove('active-action');
                }
            });
        }

        gamesList.forEach(game => {
            const item = document.createElement('div');
            item.className = 'shortcut-item';
            
            item.innerHTML = `
                <div class="icon-wrapper">
                    <img class="icon-img" src="${game.img}" alt="${game.name}" onerror="this.src='https://ui-avatars.com/api/?name=${game.name.charAt(0)}&background=1c1c22&color=fff&size=200'">
                    <div class="cooldown-overlay">
                        <div class="status-icon"></div>
                        <div class="cooldown-time"></div>
                    </div>
                </div>
                <div class="shortcut-name">${game.name}</div>
            `;
            
            item.onclick = function() {
                if (!navigator.onLine) { alert("Отсутствует подключение к сети."); return; }
                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                const wrapper = this.querySelector('.icon-wrapper');
                const statusIcon = this.querySelector('.status-icon');
                const timeLabel = this.querySelector('.cooldown-time');

                this.classList.add('active-action');
                statusIcon.innerHTML = '⚙️';
                statusIcon.style.animation = 'spin 2s linear infinite';
                timeLabel.innerText = '';

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        statusIcon.style.animation = 'none';
                        statusIcon.innerHTML = '✔️';
                        statusIcon.style.color = '#32d74b';
                        wrapper.classList.add('success-glow');

                        setTimeout(() => {
                            wrapper.classList.remove('success-glow');
                            statusIcon.innerHTML = ''; 
                            
                            cooldownSeconds = 60;
                            updateButtonsState();

                            const timerInterval = setInterval(() => {
                                cooldownSeconds--;
                                if (cooldownSeconds <= 0) {
                                    clearInterval(timerInterval);
                                    statusIcon.style.color = '#fff';
                                }
                                updateButtonsState();
                            }, 1000);
                        }, 2000);
                    })
                    .catch(() => {
                        this.classList.remove('active-action');
                        alert("Сбой сети при отправке команды.");
                    });
            };
            container.appendChild(item);
        });
    </script>
</body>
</html>
