<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0e0e12; color: #ffffff; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            min-height: 100vh; padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        .container { 
            width: 100%; max-width: 400px; display: flex; flex-direction: column;
            min-height: 100vh; position: relative;
        }

        /* Шапка с высоким z-index, чтобы игры ее не перекрывали */
        .top-bar { 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; 
            width: 100%; margin-top: 10px; margin-bottom: 20px;
            position: relative; z-index: 100;
        }

        .sys-buttons { display: flex; gap: 15px; }
        .sys-buttons.right { justify-content: flex-end; }
        
        .sys-btn { 
            background: transparent; border: none; cursor: pointer; outline: none; 
            padding: 5px; display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s ease; color: rgba(255, 255, 255, 0.7);
        }
        
        /* Единый стиль системных иконок */
        .sys-btn svg { width: 26px; height: 26px; transition: all 0.3s ease; stroke: currentColor; }
        .sys-btn:active svg { transform: scale(0.85); }

        /* Состояния кнопок (цвета) */
        .sys-btn.power-off { color: #ff453a; }
        .sys-btn.sleep-active { color: #ffd60a; }
        
        #svg-lock-closed { display: none; }
        #svg-lock-open { display: block; color: #32d74b; }
        .sys-btn.locked #svg-lock-open { display: none; }
        .sys-btn.locked #svg-lock-closed { display: block; color: #ff453a; }
        
        /* Анимация перезагрузки (теперь крутится по направлению стрелки) */
        .sys-btn.restarting svg { 
            color: #00a8ff; 
            animation: spin 1.5s linear infinite; 
        }

        h1 { 
            font-size: 28px; font-weight: 700; color: #ffffff; 
            letter-spacing: 2px; text-align: center;
        }

        /* Контент */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            transform: translateY(-40px);
            position: relative; z-index: 10;
        }

        h2 { 
            color: #d1d1d6; font-size: 18px; font-weight: 600; text-align: center; 
            margin-bottom: 50px; width: 100%; display: block;
        }

        #games-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 25px 20px; width: 100%;
        }
        
        .shortcut-item { 
            display: flex; flex-direction: column; align-items: center; 
            width: 90px; cursor: pointer; background: transparent; border: none; 
            outline: none; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        
        .icon-wrapper { 
            position: relative; width: 72px; height: 72px; border-radius: 18px; 
            margin-bottom: 10px; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3); 
            background-color: #1c1c22; transition: all 0.3s ease; 
        }
        .icon-img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
        
        .shortcut-name { 
            font-size: 12px; font-weight: 500; color: #d1d1d6; text-align: center; 
            line-height: 1.2; max-width: 90px; word-wrap: break-word; 
        }
        
        .cooldown-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.75); border-radius: 18px; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            backdrop-filter: blur(2px); transition: all 0.3s ease;
        }
        .status-icon { display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
        .cooldown-time { font-size: 22px; font-weight: 700; color: #fff; text-align: center; }
        
        /* Общая анимация вращения по часовой стрелке */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .shortcut-item:active:not(.disabled) .icon-wrapper { transform: translateY(2px) scale(0.95); }
        .shortcut-item.disabled { cursor: not-allowed; } 
        .shortcut-item.disabled:not(.active-action) .icon-wrapper { opacity: 0.4; filter: grayscale(100%); }
        .shortcut-item.active-action .cooldown-overlay { display: flex; }
        
        .icon-wrapper.success-glow {
            box-shadow: 0 0 20px rgba(50, 215, 75, 0.6);
            border: 2px solid #32d74b;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Шапка -->
        <div class="top-bar">
            <!-- Левые кнопки -->
            <div class="sys-buttons">
                <button class="sys-btn" id="btn-power" onclick="runSystemCommand('sys_power')">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                        <line x1="12" y1="2" x2="12" y2="12"></line>
                    </svg>
                </button>
                <button class="sys-btn" id="btn-restart" onclick="runSystemCommand('sys_restart')">
                    <svg id="svg-restart" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
            </div>
            
            <h1>MALM PC</h1>

            <!-- Правые кнопки -->
            <div class="sys-buttons right">
                <button class="sys-btn" id="btn-sleep" onclick="runSystemCommand('sys_sleep')">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="sys-btn" id="btn-lock" onclick="runSystemCommand('sys_lock')">
                    <svg id="svg-lock-open" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                    </svg>
                    <svg id="svg-lock-closed" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Контент -->
        <div class="main-content">
            <h2>Выберите что запустить</h2>
            <div id="games-grid"></div>
        </div>

    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        function runSystemCommand(triggerName) {
            const pass = prompt("Системная команда.\nВведите пароль для подтверждения:");
            if (pass !== "200208") {
                if (pass !== null) alert("Доступ запрещен. Неверный пароль.");
                return;
            }

            const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${triggerName}&token=${TOKEN}`;

            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    if (triggerName === 'sys_lock') document.getElementById('btn-lock').classList.add('locked');
                    else if (triggerName === 'sys_sleep') document.getElementById('btn-sleep').classList.add('sleep-active');
                    else if (triggerName === 'sys_power') document.getElementById('btn-power').classList.add('power-off');
                    else if (triggerName === 'sys_restart') document.getElementById('btn-restart').classList.add('restarting');
                })
                .catch(() => alert("Ошибка отправки. Проверьте интернет."));
        }

        const gamesList = [
            { name: "Fortnite", trigger: "fortnite", img: "fn.png" },
            { name: "Counter-Strike 2", trigger: "cs", img: "cs2.png" },
            { name: "Rust", trigger: "rust", img: "rust.png" },
            { name: "Arma Reforger", trigger: "armaref", img: "armaref.png" },
            { name: "The Finals", trigger: "finals", img: "finals.png" },
            { name: "Foxhole", trigger: "foxhole", img: "foxhole.png" },
            { name: "Euro Truck Simulator 2", trigger: "ets2", img: "ets2.png" },
            { name: "ARC Raiders", trigger: "arc", img: "arc.png" }
        ];

        const container = document.getElementById('games-grid');
        let cooldownSeconds = 0;

        const loaderSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
        const successSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#32d74b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

        function updateButtonsState() {
            const items = document.querySelectorAll('.shortcut-item');
            items.forEach(item => {
                const timeLabel = item.querySelector('.cooldown-time');
                if (cooldownSeconds > 0) {
                    item.classList.add('disabled');
                    if (item.classList.contains('active-action') && timeLabel.innerText !== '') {
                        timeLabel.innerText = cooldownSeconds;
                    }
                } else {
                    item.classList.remove('disabled');
                    item.classList.remove('active-action');
                    timeLabel.innerText = ''; 
                }
            });
        }

        gamesList.forEach(game => {
            const item = document.createElement('div');
            item.className = 'shortcut-item';
            
            item.innerHTML = `
                <div class="icon-wrapper">
                    <img class="icon-img" src="${game.img}" alt="${game.name}" onerror="this.src='https://ui-avatars.com/api/?name=${game.name.charAt(0)}&background=1c1c22&color=fff&size=200'">
                    <div class="cooldown-overlay">
                        <div class="status-icon"></div>
                        <div class="cooldown-time"></div>
                    </div>
                </div>
                <div class="shortcut-name">${game.name}</div>
            `;
            
            item.onclick = function() {
                if (!navigator.onLine) { alert("Отсутствует подключение к сети."); return; }
                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                
                const wrapper = this.querySelector('.icon-wrapper');
                const statusIcon = this.querySelector('.status-icon');
                const timeLabel = this.querySelector('.cooldown-time');

                this.classList.add('active-action');
                statusIcon.innerHTML = loaderSvg;
                statusIcon.style.animation = 'spin 1.5s linear infinite';
                timeLabel.innerText = '';

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        statusIcon.style.animation = 'none';
                        statusIcon.innerHTML = successSvg;
                        wrapper.classList.add('success-glow');

                        setTimeout(() => {
                            wrapper.classList.remove('success-glow');
                            statusIcon.innerHTML = ''; 
                            
                            cooldownSeconds = 60;
                            timeLabel.innerText = cooldownSeconds; 
                            updateButtonsState();

                            const timerInterval = setInterval(() => {
                                cooldownSeconds--;
                                if (cooldownSeconds <= 0) {
                                    clearInterval(timerInterval);
                                }
                                updateButtonsState();
                            }, 1000);
                        }, 2000);
                    })
                    .catch(() => {
                        this.classList.remove('active-action');
                        alert("Сбой сети при отправке команды.");
                    });
            };
            container.appendChild(item);
        });
    </script>
</body>
</html>
