<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALM PC Control</title>
    <style>
        /* Системный шрифт Apple */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            /* Устанавливаем фон, чтобы стеклу было что размывать */
            /* ТЫ МОЖЕШЬ ЗАМЕНИТЬ ССЫЛКУ НИЖЕ НА ЛЮБУЮ СВОЮ КАРТИНКУ */
            background: url('https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat fixed;
            background-color: #000;
            color: #ffffff; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding: 60px 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* Затемнение обоев, как при открытии центра уведомлений в iOS */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Заголовок в стиле iOS */
        h1 { 
            font-size: 28px; font-weight: 600;
            margin-bottom: 20px; 
            color: #ffffff;
            letter-spacing: 0.5px;
            text-align: left;
            width: 100%;
            padding-left: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* ------------------------------------------- */
        /* ДИЗАЙН УВЕДОМЛЕНИЯ IOS (ТО САМОЕ СТЕКЛО)    */
        /* ------------------------------------------- */
        .ios-notification { 
            width: 100%; 
            text-align: left;
            
            /* Основа стекла: полупрозрачный темный цвет + сильный блюр */
            background: rgba(35, 35, 35, 0.55); 
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            
            /* Тончайшая рамка для блика по краям */
            border: 0.5px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            
            padding: 16px; 
            color: #fff; 
            cursor: pointer; 
            
            /* Мягкая тень для эффекта стопки */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.2s;
        }

        .ios-notification:hover:not(.disabled) {
            background: rgba(45, 45, 45, 0.6);
        }

        .ios-notification:active:not(.disabled) {
            transform: scale(0.97);
            background: rgba(55, 55, 55, 0.65);
        }

        .ios-notification.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(20, 20, 20, 0.4);
        }

        /* Внутренности уведомления (шапка) */
        .ios-header { 
            display: flex; align-items: center; 
            margin-bottom: 6px; 
            font-size: 13px; 
            color: rgba(255,255,255,0.6); 
        }
        .ios-icon { 
            width: 20px; height: 20px; 
            border-radius: 5px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            margin-right: 8px;
        }
        .ios-app-name { font-weight: 600; letter-spacing: -0.2px; }
        .ios-time { margin-left: auto; font-weight: 400; }

        /* Внутренности уведомления (текст) */
        .ios-title { 
            font-weight: 600; font-size: 16px; 
            margin-bottom: 3px; 
            letter-spacing: -0.3px;
        }
        .ios-text { 
            font-size: 15px; 
            color: rgba(255,255,255,0.8); 
            line-height: 1.3; 
            letter-spacing: -0.2px;
        }

        /* Индикатор сети внизу */
        .footer { 
            margin-top: 30px; 
            font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); 
            display: flex; align-items: center; justify-content: center;
        }
        #status-dot {
            display: inline-block; width: 8px; height: 8px;
            background-color: #34c759; border-radius: 50%;
            margin-right: 6px; box-shadow: 0 0 8px rgba(52, 199, 89, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Центр управления</h1>
        
        <div id="notifications-container"></div>

        <div class="footer">
            <span id="status-dot"></span>
            <span id="status-text">Соединение с MALM PC</span>
        </div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNTc4YTg0NTEyY2Q5MDAxMzBlYWM2NSIsImlhdCI6MTc4NDEyNDkwNX0.83vjT_TzTttLnkXVDOUESncUMaVQkuejm4F0KmQEuVY";
        const COMPUTER = "MALM%20PC";

        const gamesList = [
            { name: "Fortnite", icon: "🎮", appName: "Epic Games", trigger: "fortnite", desc: "Коснитесь для запуска игрового клиента." },
            { name: "Counter-Strike", icon: "🔫", appName: "Steam", trigger: "cs", desc: "Коснитесь для запуска игрового клиента." },
            { name: "Foxhole", icon: "🪖", appName: "Steam", trigger: "foxhole", desc: "Коснитесь для запуска игрового клиента." }
        ];

        const container = document.getElementById('notifications-container');
        let cooldownSeconds = 0;

        function updateButtonsState() {
            const buttons = document.querySelectorAll('.ios-notification');
            buttons.forEach(btn => {
                if (cooldownSeconds > 0) {
                    btn.classList.add('disabled');
                    btn.querySelector('.ios-time').innerText = `${cooldownSeconds}с`;
                } else {
                    btn.classList.remove('disabled');
                    btn.querySelector('.ios-time').innerText = `Сейчас`;
                    if (btn.dataset.originalText) {
                        btn.querySelector('.ios-text').innerText = btn.dataset.originalText;
                    }
                }
            });
        }

        gamesList.forEach(game => {
            const btn = document.createElement('div');
            btn.className = 'ios-notification';
            btn.dataset.originalText = game.desc;
            
            btn.innerHTML = `
                <div class="ios-header">
                    <div class="ios-icon">${game.icon}</div>
                    <span class="ios-app-name">${game.appName}</span>
                    <span class="ios-time">Сейчас</span>
                </div>
                <div class="ios-body">
                    <div class="ios-title">${game.name}</div>
                    <div class="ios-text">${game.desc}</div>
                </div>
            `;
            
            btn.onclick = function() {
                if (!navigator.onLine) {
                    alert("Нет подключения к интернету.");
                    return;
                }

                if (cooldownSeconds > 0) return;

                const url = `https://www.triggercmd.com/api/run/triggerSave?computer=${COMPUTER}&trigger=${game.trigger}&token=${TOKEN}`;
                const textElement = this.querySelector('.ios-text');
                
                textElement.innerText = "Отправка команды на MALM PC...";

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        cooldownSeconds = 60;
                        updateButtonsState();
                        
                        textElement.innerText = "Успешно запущено. Ожидайте загрузку на ПК.";
                        
                        const timerInterval = setInterval(() => {
                            cooldownSeconds--;
                            if (cooldownSeconds > 0) {
                                updateButtonsState();
                            } else {
                                clearInterval(timerInterval);
                                updateButtonsState();
                            }
                        }, 1000);
                    })
                    .catch(() => {
                        textElement.innerText = "Ошибка: не удалось связаться с ПК.";
                        setTimeout(() => {
                            textElement.innerText = this.dataset.originalText;
                        }, 3000);
                    });
            };
            container.appendChild(btn);
        });

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateNetworkStatus() {
            if (navigator.onLine) {
                statusDot.style.backgroundColor = '#34c759';
                statusDot.style.boxShadow = '0 0 8px rgba(52, 199, 89, 0.6)';
                statusText.innerText = 'Соединение с MALM PC активно';
            } else {
                statusDot.style.backgroundColor = '#ff3b30';
                statusDot.style.boxShadow = '0 0 8px rgba(255, 59, 48, 0.6)';
                statusText.innerText = 'Нет подключения к сети';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();
    </script>
</body>
</html>
